<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Stella</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --overlay-bg: rgba(0, 0, 0, 0.65);
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            background: #000;
            color: var(--matrix-green);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono", monospace;
            padding: 20px;
            overflow-x: hidden;
        }

        #matrix {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .overlay {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
        }

        .content-box {
            background: var(--overlay-bg);
            padding: 18px;
            border-radius: 8px;
        }

        h1,
        h2,
        p,
        a,
        .contact-item {
            color: var(--matrix-green);
        }

        a,
        a:visited {
            color: var(--matrix-green);
        }

        .contact-list {
            list-style: none;
            padding: 0;
            margin: 18px 0 0;
        }

        .contact-item {
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .contact-item strong {
            display: inline-block;
            width: 100px;
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div class="overlay">
        <div class="content-box">
            <nav><a href="index.html">Home</a> · <a href="about.html">About</a> · <a
                    href="experience.html">Experience</a> · <a href="projects.html">Projects</a> · <a
                    href="gallery.html">Gallery</a></nav>
            <section class="contact">
                <h1>Let's Connect</h1>

                <p>
                    I'm always interested in connecting with people interested in robotics,
                    software development, STEM, and engineering. Feel free to reach out if
                    you'd like to discuss projects, collaboration, or opportunities.
                </p>

                <div class="contact-links">
                    <a href="mailto:stellamurphysoftwaredev@gmail.com">
                        Email
                    </a>

                    <a href="https://www.linkedin.com/in/stella-murphy-29ab03422/" target="_blank">
                        LinkedIn
                    </a>

                    <a href="https://github.com/FIRSTstar12" target="_blank">
                        GitHub
                    </a>
                </div>
            </section>
        </div>
    </div>
    <script>
        (function () {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            let W = canvas.width = innerWidth;
            let H = canvas.height = innerHeight;
            const fontSize = 18;
            const columns = Math.floor(W / fontSize) + 1;
            const drops = new Array(columns).fill(0);
            const chars = 'アィゥェォャュョッカタサナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*()';
            function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
            window.addEventListener('resize', resize);
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--matrix-green') || '#00ff41';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;
                    ctx.fillText(text, x, y);
                    if (y > H && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
